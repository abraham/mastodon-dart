name: Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sundays at midnight UTC

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: Check for new SHA
        id: check_sha
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_SHA=$(jq -r '.sha' mastodon_openapi.json)
          echo "Current SHA: $CURRENT_SHA"

          LATEST_SHA=$(gh api repos/abraham/mastodon-openapi/commits/main --jq '.sha')
          echo "Latest SHA: $LATEST_SHA"

          if [ "$CURRENT_SHA" = "$LATEST_SHA" ]; then
            echo "SHA is up to date, no update needed"
            echo "sha_changed=false" >> $GITHUB_OUTPUT
          else
            echo "SHA has changed, updating mastodon_openapi.json"
            jq --arg sha "$LATEST_SHA" '.sha = $sha' mastodon_openapi.json > mastodon_openapi.json.tmp
            mv mastodon_openapi.json.tmp mastodon_openapi.json
            echo "sha_changed=true" >> $GITHUB_OUTPUT
          fi

      - uses: dart-lang/setup-dart@v1
        if: steps.check_sha.outputs.sha_changed == 'true'

      - name: Install dependencies
        if: steps.check_sha.outputs.sha_changed == 'true'
        run: dart pub get

      - name: Run build script
        if: steps.check_sha.outputs.sha_changed == 'true'
        run: ./scripts/build

      - name: Commit changes
        id: commit
        if: steps.check_sha.outputs.sha_changed == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -b update-$(date +%Y%m%d-%H%M%S)
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update generated code"
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Push changes
        if: steps.commit.outputs.has_changes == 'true'
        run: git push origin HEAD

      - name: Create Pull Request
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "chore: update generated code" \
            --body "Automated update of generated code" \
            --base main \
            --reviewer abraham
